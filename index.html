<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhilJeep - Commuter Board</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f0ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(75, 0, 130, 0.1); text-align: center; border: 2px solid #4B0082; }
        #route-name { color: #4B0082; text-transform: uppercase; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; }
        .status-box { background: #4B0082; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        #loading-val { font-size: 3.5rem; margin: 10px 0; color: #FFD700; }
        .my-ticket-section { border: 2px dashed #4B0082; padding: 15px; border-radius: 15px; margin-bottom: 20px; background: #fffdf0; }
        #ticket-num-display { font-size: 2.5rem; font-weight: bold; color: #4B0082; margin: 5px 0; display: none; }
        .btn-ticket { background: #FFD700; color: #4B0082; border: none; padding: 15px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        .eta-box { border: 2px solid #FFD700; padding: 15px; border-radius: 15px; color: #4B0082; }
    </style>
</head>
<body>
    <div class="container">
        <div id="route-name">Detecting Route...</div>
        <div class="status-box">
            <small>NOW LOADING TICKETS:</small>
            <h1 id="loading-val">--</h1>
        </div>
        <div class="my-ticket-section">
            <p id="ticket-label" style="margin:0; font-size: 0.9rem; font-weight: bold;">Ticket Status:</p>
            <div id="ticket-num-display">#--</div>
            <button class="btn-ticket" id="ticket-btn">GET TICKET NUMBER</button>
        </div>
        <div class="eta-box">
            <p style="margin:0; font-size: 0.9rem;">Next Jeep Arrival:</p>
            <h2 id="eta-val">CONNECTING...</h2>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqw_UnppBjz5qzMjHpusuuqMzMGN3HF-k",
            databaseURL: "https://philjeep-386fc-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const myRoute = params.get('route') || 'punta-quiapo';
        document.getElementById("route-name").innerText = myRoute.replace('-', ' ').toUpperCase();

        const savedTicket = localStorage.getItem('user_ticket_' + myRoute);
        if (savedTicket) { showTicket(savedTicket); }

        document.getElementById("ticket-btn").addEventListener("click", () => {
            const counterRef = ref(db, 'routes/' + myRoute + '/next_ticket');
            runTransaction(counterRef, (curr) => (curr === null || curr >= 99) ? 1 : curr + 1)
            .then((result) => {
                const num = result.snapshot.val() - 1 || 1;
                localStorage.setItem('user_ticket_' + myRoute, num);
                showTicket(num);
            });
        });

        function showTicket(num) {
            document.getElementById("ticket-btn").style.display = "none";
            document.getElementById("ticket-label").innerText = "YOUR TICKET:";
            const display = document.getElementById("ticket-num-display");
            display.innerText = "#" + num;
            display.style.display = "block";
        }

        onValue(ref(db, 'routes/' + myRoute + '/status'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const loadingText = data.now_loading || "--";
                document.getElementById("loading-val").innerText = loadingText;
                document.getElementById("eta-val").innerText = (data.eta || "0") + " MINS";

                const myTicket = parseInt(localStorage.getItem('user_ticket_' + myRoute));
                if (!isNaN(myTicket)) {
                    // Logic to check if ticket is in range (e.g., "1-10")
                    let isMatch = false;
                    if (loadingText.includes("-")) {
                        const [start, end] = loadingText.split("-").map(n => parseInt(n.trim()));
                        if (myTicket >= start && myTicket <= end) isMatch = true;
                    } else if (parseInt(loadingText) === myTicket) {
                        isMatch = true;
                    }

                    if (isMatch) {
                        setTimeout(() => {
                            localStorage.removeItem('user_ticket_' + myRoute);
                            alert("Ticket #" + myTicket + " loaded! Safe travels.");
                            location.reload();
                        }, 4000);
                    }
                }
            }
        });
    </script>
</body>
</html>
