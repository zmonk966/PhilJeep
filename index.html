<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commuter View - Barkada-Bot</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(75, 0, 130, 0.1);
            text-align: center;
            border: 2px solid #4B0082;
        }

        .status-box {
            background: #4B0082;
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .eta-box {
            border: 2px solid #FFD700;
            padding: 15px;
            border-radius: 15px;
            color: #4B0082;
        }

        #route-name {
            color: #4B0082;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="route-name">Detecting Route...</div>

        <div class="status-box">
            <small>NOW LOADING TICKET #</small>
            <h1 id="loading-val">--</h1>
        </div>

        <div class="eta-box">
            <p style="margin:0">Next Jeep Arrival:</p>
            <h2 id="eta-val" style="margin:0">Calculating...</h2>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqw_UnppBjz5qzMjHpusuuqMzMGN3HF-k",
            databaseURL: "https://philjeep-386fc-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. Get the route from the URL (e.g., ?route=punta-quiapo)
        const params = new URLSearchParams(window.location.search);
        const myRoute = params.get('route') || 'punta-quiapo';
        document.getElementById("route-name").innerText = myRoute.replace('-', ' ');

        // 2. Listen for Real-time changes
        onValue(ref(db, 'routes/' + myRoute), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById("loading-val").innerText = data.now_loading;
                document.getElementById("eta-val").innerText = data.eta + " MINS";

                // Optional: Sound notification if ETA is 0
                if (data.eta == "0") {
                    console.log("Jeepney has arrived!");
                }
            }
        });
    </script>
</body>

</html>
